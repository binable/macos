name: MullIO
options:
  bundleIdPrefix: io.muell
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_DEBUG_DYLIB: NO
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: YES

targets:
  MullIO:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.muell.MenuBar
        PRODUCT_NAME: müll.io
        INFOPLIST_FILE: Sources/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Resources/MullIO.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    scheme:
      testTargets: []
      gatherCoverageData: false
